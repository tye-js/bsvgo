name: Deploy BSVgo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_READONLY_URL: ${{ secrets.DATABASE_READONLY_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/bsvgo
            git fetch origin main
            git reset --hard origin/main
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export DATABASE_READONLY_URL="${{ secrets.DATABASE_READONLY_URL }}"
            export NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            rm -f .env .env.production
            printf "DATABASE_URL=%s\nDATABASE_READONLY_URL=%s\nNEXT_PUBLIC_SITE_URL=%s\n" "$DATABASE_URL" "$DATABASE_READONLY_URL" "$NEXT_PUBLIC_SITE_URL" > .env.production.local
            npm ci
            npm run db:migrate
            npm run build
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
