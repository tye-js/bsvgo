name: Deploy BSVgo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          DATABASE_READONLY_URL: ${{ secrets.DATABASE_READONLY_URL || vars.DATABASE_READONLY_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || vars.NEXT_PUBLIC_SITE_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          DATABASE_READONLY_URL: ${{ secrets.DATABASE_READONLY_URL || vars.DATABASE_READONLY_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || vars.NEXT_PUBLIC_SITE_URL }}
        with:
          host: ${{ secrets.SERVER_IP || vars.SERVER_IP }}
          username: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || vars.SERVER_PORT || 22 }}
          envs: SERVER_USER,DATABASE_URL,DATABASE_READONLY_URL,NEXT_PUBLIC_SITE_URL
          script_stop: true
          script: |
            set -e
            export PATH="/usr/local/bin:$PATH"
            require_env() {
              name="$1"
              eval "value=\${$name:-}"
              if [ -z "$value" ]; then
                echo "Missing required deploy setting: $name. Configure it in GitHub Actions secrets, or repository variables only for non-sensitive values."
                exit 1
              fi
            }
            require_env SERVER_USER
            require_env DATABASE_URL
            require_env DATABASE_READONLY_URL
            require_env NEXT_PUBLIC_SITE_URL
            PROJECT_DIR="/home/${SERVER_USER}/bsvgo"
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              git clone https://github.com/tye-js/bsvgo.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"
            git fetch origin main
            git reset --hard origin/main
            rm -f .env .env.production
            printf "DATABASE_URL=%s\nDATABASE_READONLY_URL=%s\nNEXT_PUBLIC_SITE_URL=%s\n" "$DATABASE_URL" "$DATABASE_READONLY_URL" "$NEXT_PUBLIC_SITE_URL" > .env.production.local
            npm ci
            npm run db:migrate
            npm run build
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            if ! curl --fail --max-time 15 --silent --show-error http://127.0.0.1:3000/en >/dev/null; then
              echo "Deployment health check failed. PM2 status and recent logs follow."
              pm2 status
              pm2 logs bsvgo --lines 100 --nostream
              exit 1
            fi
            pm2 status
